steps:
  # Step 1: Build the Docker image using your existing Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/content-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/content-backend:latest'
      - '.'
    id: 'build-image'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/content-backend:$COMMIT_SHA'
    id: 'push-image'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'content-backend'
      - '--image=gcr.io/$PROJECT_ID/content-backend:$COMMIT_SHA'
      - '--region=australia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8081'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--timeout=300s'
      - '--no-cpu-throttling'
      - '--set-env-vars=SPRING_PROFILES_ACTIVE=prod,SPRING_DATASOURCE_URL=jdbc:postgresql://34.40.197.8:5432/contentdb,SPRING_DATASOURCE_USERNAME=postgres,JWT_EXPIRATION_MS=604800000,JWT_REFRESH_EXPIRATION_MS=2592000000,APP_FFMPEG_LOCATION=/usr/bin/ffmpeg'
      - '--update-secrets=SPRING_DATASOURCE_PASSWORD=db-password:latest,OPENAI_API_KEY=openai-api-key:latest,JWT_SECRET=jwt-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,STRIPE_PRICE_ID=stripe-price-id:latest'
    id: 'deploy-to-cloud-run'

# Build timeout (20 minutes)
timeout: 1200s

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/content-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/content-backend:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
