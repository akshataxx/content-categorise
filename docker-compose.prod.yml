version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: content-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  app:
    image: gcr.io/content-categorisation/content-app:latest
    container_name: content-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/contentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_FFMPEG_LOCATION: /usr/bin/ffmpeg
      JAVA_OPTS: -XX:InitialRAMPercentage=50 -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError
      # Pass through environment variables from .env file
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-604800000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-864000000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8081}
      # Google Play Billing
      GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_PATH: ${GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_PATH}
      GOOGLE_PLAY_PACKAGE_NAME: ${GOOGLE_PLAY_PACKAGE_NAME}
      GOOGLE_PLAY_PRODUCT_ID_MONTHLY: ${GOOGLE_PLAY_PRODUCT_ID_MONTHLY}
      # Push notifications
      FIREBASE_ENABLED: ${FIREBASE_ENABLED:-false}
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/secrets/firebase-service-account.json
    volumes:
      - ${FIREBASE_SERVICE_ACCOUNT_HOST_PATH:-/dev/null}:/app/secrets/firebase-service-account.json:ro
    # App only exposed internally to Caddy reverse proxy
    expose:
      - "8081"
    networks:
      - app-network

  # Caddy reverse proxy for HTTPS
  # Uses sslip.io for free SSL - your URL will be https://<your-ip>.sslip.io
  # Example: https://34-151-189-90.sslip.io
  # Replace dots in your IP with dashes!
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app-network

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  app-network:
    driver: bridge
