version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: content-postgres
    environment:
      POSTGRES_DB: contentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    image: content-categorization:dev
    container_name: content-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/contentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_FFMPEG_LOCATION: /usr/bin/ffmpeg
      APP_YTDLP_LOCATION: /usr/bin/yt-dlp
      JAVA_OPTS: -XX:InitialRAMPercentage=50 -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    # The container image already has a HEALTHCHECK using the readiness endpoint

volumes:
  pgdata:
