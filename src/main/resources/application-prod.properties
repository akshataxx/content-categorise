# Production profile overrides

# Datasource configuration is provided via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Flyway migrations should run on startup in production
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection pool tuning (overrideable via env)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}

# Actuator health and probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Forwarded headers when behind a proxy / load balancer
server.forward-headers-strategy=framework

# Logging
logging.level.root=INFO

# FFmpeg path (overrideable via env)
app.ffmpeg.location=${APP_FFMPEG_LOCATION:/usr/bin/ffmpeg}
