# Production profile overrides

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection pool tuning (overrideable via env)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}

# Actuator health and probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Forwarded headers when behind a proxy / load balancer
server.forward-headers-strategy=framework

# Logging
logging.level.root=INFO

# Production logging: rolling file appender with conservative rotation
logging.file.name=${LOG_FILE_NAME:logs/content-app.log}
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE_PATTERN:logs/content-app-%d{yyyy-MM-dd}.%i.log.gz}
logging.logback.rollingpolicy.max-file-size=${LOG_MAX_FILE_SIZE:20MB}
logging.logback.rollingpolicy.max-history=${LOG_MAX_HISTORY:14}
logging.logback.rollingpolicy.total-size-cap=${LOG_TOTAL_SIZE_CAP:2GB}

# File pattern (no colors)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
