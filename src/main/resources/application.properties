spring.application.name=content
spring.profiles.active=dev

spring.data.mongodb.uri=mongodb://localhost:27017/contentdb

openai.api.url=https://api.openai.com

spring.datasource.url=jdbc:postgresql://localhost:5432/contentdb
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator (dev): expose minimal endpoints and enable probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# FFmpeg configuration for yt-dlp
# Default to Apple Silicon Homebrew path, can be overridden for other systems
app.ffmpeg.location=/opt/homebrew/bin/ffmpeg
