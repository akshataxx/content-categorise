spring.config.import=optional:file:./.env.properties,optional:file:./.env
spring.application.name=content

openai.api.url=https://api.openai.com
openai.api.key=${OPENAI_API_KEY:}

# JWT configuration
app.jwtSecret=${JWT_SECRET:}
app.jwtExpirationInMs=${JWT_EXPIRATION_MS:604800000}
app.jwtRefreshExpirationInMs=${JWT_REFRESH_EXPIRATION_MS:864000000}

# Google OAuth client ID
google.client-id=${GOOGLE_CLIENT_ID:}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contentdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator (dev): expose minimal endpoints and enable probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Logging
logging.level.root=INFO

# Write logs to a rolling file by default (override via env LOG_FILE_NAME)
logging.file.name=${LOG_FILE_NAME:logs/content-app.log}
# Rolling policy (size + time based)
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE_PATTERN:logs/content-app-%d{yyyy-MM-dd}.%i.log.gz}
logging.logback.rollingpolicy.max-file-size=${LOG_MAX_FILE_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOG_MAX_HISTORY:7}
logging.logback.rollingpolicy.total-size-cap=${LOG_TOTAL_SIZE_CAP:1GB}

# Console and file patterns (simple, human readable)
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# FFmpeg configuration for yt-dlp
# Default to Apple Silicon Homebrew path, can be overridden for other systems
app.ffmpeg.location=${APP_FFMPEG_LOCATION:/usr/bin/ffmpeg}
