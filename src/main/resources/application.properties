spring.config.import=optional:file:./.env.properties,optional:file:./.env
spring.application.name=content
spring.profiles.default=${SPRING_PROFILES_ACTIVE}
server.address=0.0.0.0
server.port=8081

openai.api.url=https://api.openai.com
openai.api.key=${OPENAI_API_KEY:}

# JWT configuration
app.jwtSecret=${JWT_SECRET:}
app.jwtExpirationInMs=${JWT_EXPIRATION_MS:604800000}
app.jwtRefreshExpirationInMs=${JWT_REFRESH_EXPIRATION_MS:864000000}

# Google OAuth client ID
google.client-id=${GOOGLE_CLIENT_ID:}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contentdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator (dev): expose minimal endpoints and enable probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Logging
logging.level.root=INFO

# FFmpeg configuration for yt-dlp
# Default to Apple Silicon Homebrew path, can be overridden for other systems
app.ffmpeg.location=${APP_FFMPEG_LOCATION:/usr/bin/ffmpeg}

# Google Play Billing configuration
google.play.package-name=${GOOGLE_PLAY_PACKAGE_NAME:com.contentcategorise.transcribeassistant}
google.play.service-account-key-path=${GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_PATH:}
google.play.product-id.monthly=${GOOGLE_PLAY_PRODUCT_ID_MONTHLY:premium_monthly}
app.base-url=${APP_BASE_URL:http://localhost:8081}
