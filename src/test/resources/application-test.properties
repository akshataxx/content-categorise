# Test configuration for Testcontainers
# These will be overridden by Testcontainers dynamic configuration

# Disable security for tests
spring.security.enabled=false

# JPA/Hibernate settings for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway settings
spring.flyway.enabled=false
spring.flyway.clean-disabled=false
spring.flyway.validate-on-migrate=false

# JWT test overrides
app.jwtSecret=abcdefghijklmnopqrstuvwxyz0123456789abcdefghijklmnopqrstuvwxyz0123456789abcdabcdabcd
app.jwtExpirationInMs=3600000
app.jwtRefreshExpirationInMs=86400000

google.client-id=test-client-id

# Logging - keep quiet in tests
logging.level.org.springframework.jdbc=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# FFmpeg configuration for tests
app.ffmpeg.location=/opt/homebrew/bin/ffmpeg
# yt-dlp timeout for tests
app.ytdlp.timeout-minutes=4
